name: Deploy production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Zip project with vendor
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".idea/*" \
            -x "tests/*" \
            -x "phpunit.xml" \
            -x ".editorconfig" \
            -x ".styleci.yml" \
            -x "Dockerfile" \
            -x "compose.yml" \
            -x ".gitignore" \
            -x ".env.example"

      - name: Upload zip via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USER","$FTP_PWD" "$FTP_HOST" -e "
            set ssl:verify-certificate no;
            put deploy.zip;
            bye
          "
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PWD: ${{ secrets.FTP_PWD }}
